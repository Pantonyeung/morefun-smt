name: SMT Production Trial CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [agent-smt-v1-production-trial]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install
      - name: TypeScript check
        id: typecheck
        continue-on-error: true
        run: npm run check > /tmp/smt-typecheck.log 2>&1
      - name: Upload TypeScript diagnostics
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: smt-typecheck-diagnostics
          path: /tmp/smt-typecheck.log
      - name: Fail on TypeScript error
        if: steps.typecheck.outcome == 'failure'
        run: exit 1
      - name: Domain and API tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: morefun-smt-dist
          path: dist
      - name: Verify no secrets or legacy patch imports
        run: |
          ! grep -R "BEGIN PRIVATE KEY" src .env.example
          ! grep -R "DineInItemSplitPatch\|MutationObserver" src/main.tsx src/App.tsx src/hooks src/services src/domain
