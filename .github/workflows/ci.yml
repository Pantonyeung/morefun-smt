name: SMT CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: smt-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: TypeScript check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Verify no secrets or legacy patch imports
        run: |
          ! grep -R "BEGIN PRIVATE KEY" src .env.example
          ! grep -R "DineInItemSplitPatch\|MutationObserver" src/main.tsx src/App.tsx src/hooks src/services src/domain
