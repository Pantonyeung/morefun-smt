name: SMT Android APK

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  android-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: npm install
      - name: Verify web application
        run: npm run ci
      - name: Generate Android project
        run: |
          npx cap add android
          npx cap sync android
      - name: Configure Sunmi T2s landscape shell
        run: |
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          text = text.replace('android:name=".MainActivity"', 'android:name=".MainActivity" android:screenOrientation="landscape" android:configChanges="orientation|screenSize|keyboardHidden|keyboard|navigation|uiMode"')
          manifest.write_text(text)
          activity = Path('android/app/src/main/java/com/morefun/smt/MainActivity.java')
          activity.write_text('''package com.morefun.smt;\n\nimport android.os.Bundle;\nimport android.view.View;\nimport android.view.WindowManager;\nimport com.getcapacitor.BridgeActivity;\n\npublic class MainActivity extends BridgeActivity {\n  @Override public void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n    getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);\n    enterImmersiveMode();\n  }\n  @Override public void onWindowFocusChanged(boolean hasFocus) {\n    super.onWindowFocusChanged(hasFocus);\n    if (hasFocus) enterImmersiveMode();\n  }\n  private void enterImmersiveMode() {\n    getWindow().getDecorView().setSystemUiVisibility(\n      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY | View.SYSTEM_UI_FLAG_FULLSCREEN |\n      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN |\n      View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION | View.SYSTEM_UI_FLAG_LAYOUT_STABLE\n    );\n  }\n}\n''')
          PY
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk MoreFun-SMT-T2s-V2-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: MoreFun-SMT-T2s-V2-APK
          path: MoreFun-SMT-T2s-V2-debug.apk
          if-no-files-found: error
